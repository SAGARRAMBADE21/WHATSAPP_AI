# ─────────────────────────────────────────────────────────────
# Production Docker Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this file does:
#   - Removes local MongoDB (uses MongoDB Atlas instead)
#   - Adds memory limits
#   - Binds app to localhost only (Nginx handles public traffic)
#   - Adds production environment flags
# ─────────────────────────────────────────────────────────────

services:
  app:
    # In production, only listen on localhost — Nginx handles HTTPS
    ports:
      - "127.0.0.1:3000:3000"

    environment:
      NODE_ENV: production
      # MongoDB Atlas URI — set this in your EC2 .env file:
      # MONGODB_URI=mongodb+srv://user:password@cluster.mongodb.net/workspace_navigator
      LOG_LEVEL: warn

    # Resource limits — prevents runaway memory on t3.small
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    # No longer depends on local mongo service
    depends_on: {}

    restart: always   # Stricter than unless-stopped — restarts even on manual stop

  # ── Disable local MongoDB in production ──
  # Use MongoDB Atlas free tier instead:
  # https://www.mongodb.com/cloud/atlas/register
  mongo:
    profiles:
      - local-only   # Only starts if you explicitly run --profile local-only

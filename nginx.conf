# ─────────────────────────────────────────────────────────────
# Nginx Production Config — ChatFuse
# Replace: yourdomain.com with your actual domain
# SSL certs managed by: sudo certbot --nginx -d yourdomain.com
# ─────────────────────────────────────────────────────────────

# Rate limiting zone — 50 req/s per IP
limit_req_zone $binary_remote_addr zone=app_limit:10m rate=50r/s;

# ── HTTP → HTTPS redirect ──────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt challenge (Certbot needs this)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS / Production Server ──────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL (filled in by Certbot automatically) ──
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ──
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip Compression ──
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;

    # ── File Upload Limit ──
    client_max_body_size 10m;

    # ── Rate Limiting ──
    limit_req zone=app_limit burst=100 nodelay;
    limit_req_status 429;

    # ── Proxy to Node.js App ──
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;

        # WebSocket support (required for Socket.IO QR code)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts (WhatsApp QR polling needs longer)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # ── Block common attack paths ──
    location ~ /\. {
        deny all;
        return 404;
    }
}

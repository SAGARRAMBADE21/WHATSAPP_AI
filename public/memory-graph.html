<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemOS — Memory Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --text: #e2e2f0;
    --muted: #6b6b8a;
    --episodic: #3b82f6;
    --semantic: #10b981;
    --procedural: #f59e0b;
    --explicit-edge: rgba(255,255,255,0.35);
    --tag-edge: rgba(255,255,255,0.1);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top Bar ── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .topbar-brand {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: #fff;
    margin-right: 8px;
  }
  .topbar-brand span { color: var(--semantic); }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
  }
  .stat-pill .dot { width: 8px; height: 8px; border-radius: 50%; }

  .filter-group { display: flex; gap: 6px; margin-left: auto; }
  .filter-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #444; color: var(--text); }
  .filter-btn.active { color: #fff; border-color: transparent; }
  .filter-btn.episodic.active { background: var(--episodic); }
  .filter-btn.semantic.active { background: var(--semantic); }
  .filter-btn.procedural.active { background: var(--procedural); }
  .filter-btn.all.active { background: #333; }

  .topbar-right { display: flex; gap: 8px; align-items: center; margin-left: 8px; }
  .user-badge {
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }
  .refresh-btn {
    padding: 5px 12px;
    border-radius: 6px;
    background: var(--semantic);
    color: #fff;
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .refresh-btn:hover { opacity: 0.85; }

  /* ── Main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Graph canvas ── */
  #graph-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #graph-svg { width: 100%; height: 100%; }

  .node circle {
    stroke-width: 2px;
    cursor: pointer;
    transition: filter 0.15s;
  }
  .node circle:hover { filter: brightness(1.3); }
  .node.expired circle { opacity: 0.35; stroke-dasharray: 4 2; }
  .node.selected circle { stroke: #fff !important; stroke-width: 3px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.5)); }

  .link { stroke-width: 1.5px; fill: none; }
  .link.explicit { stroke: var(--explicit-edge); }
  .link.tag { stroke: var(--tag-edge); stroke-dasharray: 4 3; }

  .node-label {
    font-size: 10px;
    fill: rgba(255,255,255,0.7);
    pointer-events: none;
    text-anchor: middle;
  }

  .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }
  .empty-state h3 { font-size: 18px; color: var(--text); }
  .empty-state p { font-size: 14px; max-width: 360px; text-align: center; line-height: 1.6; }

  /* ── Detail panel ── */
  .detail-panel {
    width: 320px;
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .detail-panel.hidden { transform: translateX(100%); width: 0; border: none; }

  .detail-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .detail-header h3 { font-size: 14px; font-weight: 600; }
  .close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; }
  .close-btn:hover { color: var(--text); }

  .detail-body { padding: 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; }

  .detail-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .detail-row { display: flex; flex-direction: column; gap: 4px; }
  .detail-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-value { font-size: 13px; line-height: 1.5; word-break: break-word; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
  }

  .delete-btn {
    margin-top: auto;
    padding: 8px 16px;
    border-radius: 6px;
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    color: #ef4444;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .delete-btn:hover { background: rgba(239,68,68,0.25); }

  /* ── Legend ── */
  .legend {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(17,17,24,0.85);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    backdrop-filter: blur(8px);
  }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-line { width: 20px; height: 2px; flex-shrink: 0; }

  /* ── Tooltip ── */
  .tooltip {
    position: absolute;
    background: rgba(17,17,24,0.95);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    pointer-events: none;
    max-width: 240px;
    line-height: 1.5;
    z-index: 100;
    display: none;
  }
  .tooltip.visible { display: block; }
  .tooltip strong { display: block; margin-bottom: 2px; }

  /* ── Loading ── */
  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
    font-size: 14px;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--semantic);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-brand">Mem<span>OS</span></span>

  <div id="stats-pills" style="display:flex;gap:8px;"></div>

  <div class="filter-group">
    <button class="filter-btn all active" onclick="setFilter('all')">All</button>
    <button class="filter-btn episodic" onclick="setFilter('episodic')">Episodic</button>
    <button class="filter-btn semantic" onclick="setFilter('semantic')">Semantic</button>
    <button class="filter-btn procedural" onclick="setFilter('procedural')">Procedural</button>
  </div>

  <div class="topbar-right">
    <span class="user-badge" id="user-badge">—</span>
    <button class="refresh-btn" onclick="loadGraph()">Refresh</button>
  </div>
</div>

<div class="main">
  <div id="graph-container">
    <svg id="graph-svg"></svg>
    <div class="loading" id="loading"><div class="spinner"></div> Loading memory graph…</div>
    <div class="empty-state" id="empty-state" style="display:none">
      <h3>No memories yet</h3>
      <p>Start using the AI assistant. Every tool call, preference, and decision will appear here as a node in your memory graph.</p>
    </div>
    <div class="legend">
      <div class="legend-row"><div class="legend-dot" style="background:var(--episodic)"></div> Episodic (what happened)</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--semantic)"></div> Semantic (what I know)</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--procedural)"></div> Procedural (how to do it)</div>
      <div class="legend-row" style="margin-top:4px"><div class="legend-line" style="background:var(--explicit-edge)"></div> Explicit link</div>
      <div class="legend-row"><div class="legend-line" style="background:var(--tag-edge);border-top:1px dashed var(--tag-edge)"></div> Shared tag</div>
    </div>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="detail-panel hidden" id="detail-panel">
    <div class="detail-header">
      <h3>Memory Detail</h3>
      <button class="close-btn" onclick="closeDetail()">×</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
// ── Auth ────────────────────────────────────────────────────────────────────
const token = new URLSearchParams(location.search).get('token') || localStorage.getItem('memos_token');
if (!token) { location.href = '/'; }
if (token) localStorage.setItem('memos_token', token);

const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

// ── State ───────────────────────────────────────────────────────────────────
let graphData = { nodes: [], edges: [] };
let activeFilter = 'all';
let selectedNodeId = null;
let simulation = null;

const TIER_COLOR = { episodic: '#3b82f6', semantic: '#10b981', procedural: '#f59e0b' };
const IMPORTANCE_RADIUS = { high: 18, medium: 13, low: 9 };
const TOOL_ICONS = {
  gmail: '✉', calendar: '📅', drive: '📁', sheets: '📊', docs: '📄',
  classroom: '🎓', manus: '🤖', v0: '⚡', whatsapp: '💬', orchestrator: '🧠'
};

// ── Load ────────────────────────────────────────────────────────────────────
async function loadGraph() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('empty-state').style.display = 'none';
  try {
    const res = await fetch('/api/memory/graph', { headers });
    if (res.status === 401) { location.href = '/'; return; }
    graphData = await res.json();

    // Set user badge from token payload
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      document.getElementById('user-badge').textContent = payload.email || '—';
    } catch {}

    renderStats(graphData.stats || {});
    renderGraph();
  } catch (e) {
    console.error(e);
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

// ── Stats pills ──────────────────────────────────────────────────────────────
function renderStats(stats) {
  const container = document.getElementById('stats-pills');
  container.innerHTML = [
    { label: `${stats.episodic ?? 0} Episodic`, tier: 'episodic' },
    { label: `${stats.semantic ?? 0} Semantic`, tier: 'semantic' },
    { label: `${stats.procedural ?? 0} Procedural`, tier: 'procedural' },
  ].map(s => `
    <div class="stat-pill">
      <div class="dot" style="background:${TIER_COLOR[s.tier]}"></div>
      ${s.label}
    </div>
  `).join('');
}

// ── Filter ──────────────────────────────────────────────────────────────────
function setFilter(tier) {
  activeFilter = tier;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filter-btn.${tier}`).classList.add('active');
  renderGraph();
}

// ── Graph ───────────────────────────────────────────────────────────────────
function renderGraph() {
  const svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();
  if (simulation) simulation.stop();

  const nodes = activeFilter === 'all'
    ? [...graphData.nodes]
    : graphData.nodes.filter(n => n.tier === activeFilter);

  const nodeIds = new Set(nodes.map(n => n.id));
  const edges = graphData.edges.filter(e => nodeIds.has(e.source) && nodeIds.has(e.target));

  if (nodes.length === 0) {
    document.getElementById('empty-state').style.display = 'flex';
    return;
  }
  document.getElementById('empty-state').style.display = 'none';

  const container = document.getElementById('graph-container');
  const W = container.clientWidth;
  const H = container.clientHeight;

  const g = svg.append('g');

  // Zoom/pan
  svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', e => g.attr('transform', e.transform)));

  // Edges
  const link = g.append('g').selectAll('line')
    .data(edges)
    .join('line')
    .attr('class', d => `link ${d.type}`)
    .attr('stroke', d => d.type === 'explicit' ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.1)')
    .attr('stroke-dasharray', d => d.type === 'tag' ? '4 3' : null)
    .attr('stroke-width', 1.5);

  // Nodes
  const node = g.append('g').selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', d => `node${d.expired ? ' expired' : ''}${d.id === selectedNodeId ? ' selected' : ''}`)
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag', dragged)
      .on('end', dragEnd))
    .on('click', (event, d) => { event.stopPropagation(); selectNode(d); })
    .on('mouseover', (event, d) => showTooltip(event, d))
    .on('mousemove', (event) => moveTooltip(event))
    .on('mouseout', hideTooltip);

  node.append('circle')
    .attr('r', d => IMPORTANCE_RADIUS[d.importance] ?? 13)
    .attr('fill', d => TIER_COLOR[d.tier])
    .attr('fill-opacity', d => d.expired ? 0.3 : 0.85)
    .attr('stroke', d => TIER_COLOR[d.tier])
    .attr('stroke-opacity', 0.6);

  node.append('text')
    .attr('class', 'node-label')
    .attr('dy', d => (IMPORTANCE_RADIUS[d.importance] ?? 13) + 12)
    .text(d => d.label.slice(0, 22) + (d.label.length > 22 ? '…' : ''));

  // Click on background → deselect
  svg.on('click', () => { selectedNodeId = null; closeDetail(); updateSelection(); });

  // Simulation
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => d.id).distance(90).strength(0.3))
    .force('charge', d3.forceManyBody().strength(-220))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('x', d3.forceX(W / 2).strength(0.04))
    .force('y', d3.forceY(H / 2).strength(0.04))
    .force('collision', d3.forceCollide().radius(d => (IMPORTANCE_RADIUS[d.importance] ?? 13) + 8));

  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

function updateSelection() {
  d3.selectAll('.node').classed('selected', d => d.id === selectedNodeId);
}

// ── Drag ────────────────────────────────────────────────────────────────────
function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ── Tooltip ─────────────────────────────────────────────────────────────────
function showTooltip(event, d) {
  const tip = document.getElementById('tooltip');
  tip.innerHTML = `<strong>${TOOL_ICONS[d.source_tool] || ''} ${d.source_tool}</strong>${d.label}`;
  tip.classList.add('visible');
  moveTooltip(event);
}
function moveTooltip(event) {
  const tip = document.getElementById('tooltip');
  tip.style.left = (event.offsetX + 14) + 'px';
  tip.style.top = (event.offsetY - 10) + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

// ── Detail panel ─────────────────────────────────────────────────────────────
function selectNode(d) {
  selectedNodeId = d.id;
  updateSelection();

  const panel = document.getElementById('detail-panel');
  const body = document.getElementById('detail-body');
  panel.classList.remove('hidden');

  const tierColors = TIER_COLOR;
  const date = new Date(d.created_at).toLocaleString();
  const expired = d.expired ? '<span style="color:#ef4444;font-size:11px"> · EXPIRED</span>' : '';

  body.innerHTML = `
    <div>
      <span class="detail-badge" style="background:${tierColors[d.tier]}22;color:${tierColors[d.tier]};border:1px solid ${tierColors[d.tier]}44">
        ${d.tier.toUpperCase()}
      </span>
      ${expired}
    </div>

    ${d.subject ? `<div class="detail-row">
      <span class="detail-label">Subject</span>
      <span class="detail-value">${esc(d.subject)}</span>
    </div>` : ''}

    ${d.workflow_name ? `<div class="detail-row">
      <span class="detail-label">Workflow</span>
      <span class="detail-value">${esc(d.workflow_name)}</span>
    </div>` : ''}

    <div class="detail-row">
      <span class="detail-label">Content</span>
      <span class="detail-value">${esc(d.content)}</span>
    </div>

    <div class="detail-row">
      <span class="detail-label">Source Tool</span>
      <span class="detail-value">${TOOL_ICONS[d.source_tool] || ''} ${d.source_tool}</span>
    </div>

    <div class="detail-row">
      <span class="detail-label">Importance</span>
      <span class="detail-value">${d.importance}</span>
    </div>

    ${d.tags && d.tags.length > 0 ? `<div class="detail-row">
      <span class="detail-label">Tags</span>
      <div class="tag-list">${d.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>
    </div>` : ''}

    <div class="detail-row">
      <span class="detail-label">Created</span>
      <span class="detail-value" style="color:var(--muted);font-size:12px">${date}</span>
    </div>

    <button class="delete-btn" onclick="deleteMemory('${d.id}')">Delete this memory</button>
  `;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.add('hidden');
}

async function deleteMemory(id) {
  if (!confirm('Delete this memory? This cannot be undone.')) return;
  const res = await fetch(`/api/memory/${id}`, { method: 'DELETE', headers });
  if (res.ok) { closeDetail(); selectedNodeId = null; await loadGraph(); }
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Boot ─────────────────────────────────────────────────────────────────────
loadGraph();
</script>
</body>
</html>

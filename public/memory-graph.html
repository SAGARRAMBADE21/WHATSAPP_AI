<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemOS — Memory Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000;
  --surface: #000;
  --border: rgba(255,255,255,0.06);
  --text: #fff;
  --muted: #666;
  --e: #3b82f6;
  --s: #10b981;
  --p: #f59e0b;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}


/* ── Topbar ── */
.topbar {
  position: relative; z-index: 10;
  display: flex; align-items: center; gap: 12px;
  padding: 16px 32px;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}

.brand { font-size: 17px; font-weight: 800; letter-spacing: -0.5px; color: #fff; margin-right: 4px; }
.brand span { color: #FF6A2F; }

.stat-card {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px; border-radius: 8px;
  border: 1px solid transparent; font-size: 12px; font-weight: 600;
}
.stat-card.e { background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.2); color: var(--e); }
.stat-card.s { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.2); color: var(--s); }
.stat-card.p { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.2); color: var(--p); }
.stat-dot { width: 7px; height: 7px; border-radius: 50%; }

.topbar-gap { flex: 1; }

.filter-wrap { display: flex; gap: 4px; }
.fbtn {
  padding: 5px 13px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; font-family: 'Inter', sans-serif;
}
.fbtn:hover { color: var(--text); border-color: #333; }
.fbtn.on { color: #fff; border-color: transparent; }
.fbtn.on.all  { background: #222; }
.fbtn.on.e    { background: var(--e); }
.fbtn.on.s    { background: var(--s); }
.fbtn.on.p    { background: var(--p); }

.user-badge {
  padding: 4px 10px; border-radius: 6px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  font-size: 11px; color: var(--muted);
}

.icon-btn {
  padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; font-family: 'Inter', sans-serif;
}
.icon-btn:hover { color: var(--text); border-color: #333; }
.icon-btn.green { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.3); color: var(--s); }
.icon-btn.green:hover { background: rgba(16,185,129,0.25); }

.back-link {
  padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
  color: var(--muted); font-size: 12px; text-decoration: none;
  transition: all 0.15s; white-space: nowrap;
}
.back-link:hover { color: var(--text); border-color: #333; }

/* ── Layout ── */
.main { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }

/* ── Graph ── */
#gc { flex: 1; position: relative; overflow: hidden; }
#svg { width: 100%; height: 100%; }

/* SVG filter definitions */
defs { display: none; }

.node-circle {
  cursor: pointer;
  transition: filter 0.2s;
}
.node-group:hover .node-circle { filter: brightness(1.4); }
.node-group.selected .node-circle { filter: drop-shadow(0 0 10px currentColor) brightness(1.3); }
.node-group.selected .node-ring { opacity: 1 !important; }
.node-group.expired { opacity: 0.3; }

.node-ring {
  fill: none; stroke-width: 2; opacity: 0;
  transition: opacity 0.2s;
  animation: none;
}

.node-label {
  font-size: 10px; font-family: 'Inter', sans-serif;
  fill: rgba(255,255,255,0.65); pointer-events: none;
  text-anchor: middle;
}

.link { fill: none; }
.link.explicit { stroke: rgba(255,255,255,0.7); stroke-width: 2; }
.link.tag { stroke: rgba(255,255,255,0.35); stroke-width: 1.5; stroke-dasharray: 5 4; }

/* ── Zoom controls ── */
.zoom-controls {
  position: absolute; right: 16px; bottom: 80px;
  display: flex; flex-direction: column; gap: 4px; z-index: 10;
}
.zbtn {
  width: 32px; height: 32px; border-radius: 8px;
  background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.08);
  color: var(--muted); font-size: 16px; font-weight: 300;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; backdrop-filter: blur(10px);
}
.zbtn:hover { color: var(--text); border-color: #444; }

/* ── Legend ── */
.legend {
  position: absolute; left: 16px; bottom: 16px; z-index: 10;
  background: rgba(13,13,26,0.85); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px;
  backdrop-filter: blur(12px); display: flex; flex-direction: column; gap: 7px;
}
.lr { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); }
.ld { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.ll { width: 18px; height: 0; border-top: 2px solid rgba(255,255,255,0.25); flex-shrink: 0; }
.ll.dashed { border-top-style: dashed; border-top-color: rgba(255,255,255,0.12); }

/* ── Tooltip ── */
.tip {
  position: absolute; pointer-events: none; z-index: 50; display: none;
  background: rgba(0,0,0,0.95); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px; padding: 8px 12px; font-size: 12px;
  max-width: 220px; line-height: 1.5; backdrop-filter: blur(10px);
}
.tip.show { display: block; }
.tip-tier { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.tip-content { color: rgba(255,255,255,0.75); }

/* ── Empty state ── */
.empty {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px; z-index: 5;
  pointer-events: none;
}
.empty-glass {
  background: rgba(0,0,0,0.8); backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.06); border-radius: 16px;
  padding: 32px 40px; text-align: center;
}
.empty h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.empty p { color: var(--muted); font-size: 13px; line-height: 1.7; max-width: 320px; }

/* ── Detail panel ── */
.detail {
  width: 300px; flex-shrink: 0;
  background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}
.detail.open { transform: translateX(0); }

.detail-head {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.detail-head h3 { font-size: 13px; font-weight: 700; }
.close-x { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; padding: 0; }
.close-x:hover { color: var(--text); }

.detail-tier-bar {
  padding: 12px 16px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.tier-badge {
  padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
}

.detail-body { padding: 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 14px; }
.drow { display: flex; flex-direction: column; gap: 4px; }
.dlabel { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); }
.dval { font-size: 13px; line-height: 1.55; word-break: break-word; }

.tag-row { display: flex; flex-wrap: wrap; gap: 5px; }
.tag {
  padding: 2px 8px; border-radius: 4px; font-size: 11px; color: var(--muted);
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
}

.del-btn {
  margin-top: auto; padding: 9px; border-radius: 8px; border: 1px solid rgba(239,68,68,0.25);
  background: rgba(239,68,68,0.08); color: #ef4444; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background 0.15s; font-family: 'Inter', sans-serif;
}
.del-btn:hover { background: rgba(239,68,68,0.18); }

/* ── Loading ── */
.loading {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  gap: 10px; color: var(--muted); font-size: 13px; z-index: 20;
  background: var(--bg);
}
.spin {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid var(--border); border-top-color: var(--s);
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* pulse for high importance real nodes */
@keyframes pulse-ring {
  0%   { stroke-opacity: 0.6; r: attr(r); }
  100% { stroke-opacity: 0; r: calc(attr(r) + 14px); }
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <span class="brand">Memory <span>Graph</span></span>


  <div class="topbar-gap"></div>

  <div class="filter-wrap">
    <button class="fbtn on all" onclick="setFilter('all',this)">All</button>
    <button class="fbtn e"      onclick="setFilter('episodic',this)">Episodic</button>
    <button class="fbtn s"      onclick="setFilter('semantic',this)">Semantic</button>
    <button class="fbtn p"      onclick="setFilter('procedural',this)">Procedural</button>
  </div>

  <span class="user-badge" id="ubadge">—</span>
  <button class="icon-btn green" onclick="loadGraph()">Refresh</button>
  <a class="back-link" href="/dashboard.html">← Dashboard</a>
</div>

<!-- Main -->
<div class="main">
  <div id="gc">
    <svg id="svg">
      <defs>
        <filter id="glow-e" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-s" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-p" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>

    <!-- Empty state (ghost graph behind) -->
    <div class="empty" id="empty" style="display:none">
      <div class="empty-glass">
        <h3>No memories yet</h3>
        <p>Every tool call, decision, and preference from your WhatsApp assistant will appear here as a connected node.</p>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading"><div class="spin"></div> Loading…</div>

    <!-- Zoom controls -->
    <div class="zoom-controls">
      <button class="zbtn" onclick="zoomBy(1.3)" title="Zoom in">+</button>
      <button class="zbtn" onclick="zoomBy(0.77)" title="Zoom out">−</button>
      <button class="zbtn" onclick="fitGraph()" title="Fit" style="font-size:12px">⊡</button>
    </div>


    <div class="tip" id="tip"></div>
  </div>

  <!-- Detail panel -->
  <div class="detail" id="detail">
    <div class="detail-head">
      <h3>Memory Detail</h3>
      <button class="close-x" onclick="closeDetail()">×</button>
    </div>
    <div class="detail-tier-bar" id="detail-tier-bar"></div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────────────────
const token = new URLSearchParams(location.search).get('token') || localStorage.getItem('navigator_token');
if (!token) { location.href = '/dashboard.html'; }
if (token) {
  localStorage.setItem('navigator_token', token);
  try {
    const p = JSON.parse(atob(token.split('.')[1]));
    document.getElementById('ubadge').textContent = p.email || '—';
  } catch {}
}
const H = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

// ── Constants ─────────────────────────────────────────────────────────────────
const TC = { episodic: '#3b82f6', semantic: '#10b981', procedural: '#f59e0b' };
const GLOW = { episodic: 'url(#glow-e)', semantic: 'url(#glow-s)', procedural: 'url(#glow-p)' };
const RADIUS = { high: 22, medium: 16, low: 11 };

// ── State ─────────────────────────────────────────────────────────────────────
let data = { nodes: [], edges: [], stats: {} };
let activeFilter = 'all';
let selectedId = null;
let sim = null;
let zoomBehavior = null;
let svgG = null;

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadGraph() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('empty').style.display = 'none';
  try {
    const r = await fetch('/api/memory/graph', { headers: H });
    if (r.status === 401) { location.href = '/dashboard.html'; return; }
    data = await r.json();
    render();
  } catch(e) { console.error(e); }
  finally { document.getElementById('loading').style.display = 'none'; }
}


// ── Filter ────────────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  closeDetail(); selectedId = null;
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const svg = d3.select('#svg');
  svg.selectAll('g.root').remove();
  if (sim) sim.stop();

  const nodes = (activeFilter === 'all' ? data.nodes : data.nodes.filter(n => n.tier === activeFilter)).map(n => ({...n}));
  const ids = new Set(nodes.map(n => n.id));
  const edges = data.edges.filter(e => ids.has(typeof e.source === 'object' ? e.source.id : e.source) && ids.has(typeof e.target === 'object' ? e.target.id : e.target));

  const W = document.getElementById('gc').clientWidth;
  const H = document.getElementById('gc').clientHeight;

  if (nodes.length === 0) {
    renderGhostGraph(svg, W, H);
    document.getElementById('empty').style.display = 'flex';
    return;
  }
  document.getElementById('empty').style.display = 'none';

  svgG = svg.append('g').attr('class', 'root');

  zoomBehavior = d3.zoom().scaleExtent([0.1, 5])
    .on('zoom', e => svgG.attr('transform', e.transform));
  svg.call(zoomBehavior);
  svg.on('click.deselect', () => { selectedId = null; closeDetail(); updateSel(); });

  // Links
  const link = svgG.append('g').selectAll('line')
    .data(edges).join('line')
    .attr('class', d => `link ${d.type}`)
    .attr('stroke', d => d.type === 'explicit' ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.35)')
    .attr('stroke-width', d => d.type === 'explicit' ? 2 : 1.5)
    .attr('stroke-dasharray', d => d.type === 'tag' ? '5 4' : null);

  // Node groups
  const node = svgG.append('g').selectAll('g')
    .data(nodes).join('g')
    .attr('class', d => `node-group${d.expired ? ' expired' : ''}`)
    .style('cursor', 'pointer')
    .call(d3.drag().on('start', ds).on('drag', dd).on('end', de))
    .on('click', (ev, d) => { ev.stopPropagation(); selectNode(d); })
    .on('mouseover', (ev, d) => showTip(ev, d))
    .on('mousemove', moveTip)
    .on('mouseout', hideTip);

  // Outer glow ring for high importance
  node.filter(d => d.importance === 'high')
    .append('circle')
    .attr('r', d => RADIUS[d.importance] + 8)
    .attr('fill', 'none')
    .attr('stroke', d => TC[d.tier])
    .attr('stroke-opacity', 0.25)
    .attr('stroke-width', 2)
    .attr('class', 'node-ring');

  // Main circle
  node.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => RADIUS[d.importance])
    .attr('fill', d => TC[d.tier])
    .attr('fill-opacity', 0.85)
    .attr('stroke', d => TC[d.tier])
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', 0.6)
    .attr('filter', d => d.importance === 'high' ? GLOW[d.tier] : null);


  // Label
  node.append('text')
    .attr('class', 'node-label')
    .attr('dy', d => RADIUS[d.importance] + 13)
    .attr('font-size', 10)
    .text(d => {
      const label = d.subject || d.workflow_name || d.content;
      return label.length > 24 ? label.slice(0, 22) + '…' : label;
    });

  // Simulation
  sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => d.id).distance(d => d.type === 'tag' ? 120 : 80).strength(0.4))
    .force('charge', d3.forceManyBody().strength(-280))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('x', d3.forceX(W/2).strength(0.03))
    .force('y', d3.forceY(H/2).strength(0.03))
    .force('collide', d3.forceCollide().radius(d => RADIUS[d.importance] + 12));

  sim.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

// ── Ghost graph for empty state ───────────────────────────────────────────────
function renderGhostGraph(svg, W, H) {
  const g = svg.append('g').attr('class', 'root').attr('opacity', 0.18);
  const tiers = ['episodic','semantic','procedural'];
  const gNodes = Array.from({length: 14}, (_, i) => ({
    id: i, tier: tiers[i % 3],
    importance: ['high','medium','low'][i % 3],
    x: W/2 + (Math.random()-0.5)*300, y: H/2 + (Math.random()-0.5)*200
  }));
  const gEdges = [[0,1],[1,2],[2,3],[3,4],[4,5],[0,6],[6,7],[7,8],[2,9],[9,10],[5,11],[11,12],[3,13]].map(([s,t]) => ({source:s,target:t}));

  g.append('g').selectAll('line').data(gEdges).join('line')
    .attr('stroke','rgba(255,255,255,0.3)').attr('stroke-width',1.5);

  const gn = g.append('g').selectAll('g').data(gNodes).join('g');
  gn.append('circle')
    .attr('r', d => RADIUS[d.importance])
    .attr('fill', d => TC[d.tier]).attr('fill-opacity', 0.7)
    .attr('stroke', d => TC[d.tier]).attr('stroke-width', 1.5);

  const ghostSim = d3.forceSimulation(gNodes)
    .force('link', d3.forceLink(gEdges).id(d => d.id).distance(90))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(W/2, H/2));

  ghostSim.on('tick', () => {
    g.selectAll('line')
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    gn.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

// ── Drag ──────────────────────────────────────────────────────────────────────
function ds(e,d) { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
function dd(e,d) { d.fx=e.x; d.fy=e.y; }
function de(e,d) { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }

// ── Zoom ─────────────────────────────────────────────────────────────────────
function zoomBy(factor) {
  if (!zoomBehavior) return;
  d3.select('#svg').transition().duration(300).call(zoomBehavior.scaleBy, factor);
}
function fitGraph() {
  if (!zoomBehavior || !svgG) return;
  const svg = d3.select('#svg');
  const W = document.getElementById('gc').clientWidth;
  const H = document.getElementById('gc').clientHeight;
  svg.transition().duration(400).call(
    zoomBehavior.transform,
    d3.zoomIdentity.translate(W/2, H/2).scale(1)
  );
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
function showTip(ev, d) {
  const tip = document.getElementById('tip');
  tip.innerHTML = `<div class="tip-tier" style="color:${TC[d.tier]}">${d.tier}</div><div class="tip-content">${esc(d.subject || d.workflow_name || d.content).slice(0,80)}</div>`;
  tip.classList.add('show');
  moveTip(ev);
}
function moveTip(ev) {
  const tip = document.getElementById('tip');
  tip.style.left = (ev.offsetX + 16) + 'px';
  tip.style.top  = (ev.offsetY - 8) + 'px';
}
function hideTip() { document.getElementById('tip').classList.remove('show'); }

// ── Selection ─────────────────────────────────────────────────────────────────
function updateSel() {
  d3.selectAll('.node-group').classed('selected', d => d.id === selectedId);
}

function selectNode(d) {
  selectedId = d.id;
  updateSel();
  openDetail(d);
}

// ── Detail panel ──────────────────────────────────────────────────────────────
function openDetail(d) {
  const panel = document.getElementById('detail');
  const tierBar = document.getElementById('detail-tier-bar');
  const body = document.getElementById('detail-body');
  panel.classList.add('open');

  tierBar.innerHTML = `
    <span class="tier-badge" style="background:${TC[d.tier]}22;color:${TC[d.tier]};border:1px solid ${TC[d.tier]}44">${d.tier}</span>
    <span style="font-size:12px;color:var(--muted)">${d.source_tool}</span>
    ${d.expired ? '<span style="margin-left:auto;font-size:11px;color:#ef4444">EXPIRED</span>' : ''}
  `;

  const date = new Date(d.created_at).toLocaleString();
  body.innerHTML = `
    ${d.subject ? row('Subject', d.subject) : ''}
    ${d.workflow_name ? row('Workflow', d.workflow_name) : ''}
    ${row('Content', d.content)}
    ${row('Importance', cap(d.importance))}
    ${d.tags?.length ? `<div class="drow"><div class="dlabel">Tags</div><div class="tag-row">${d.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div></div>` : ''}
    ${row('Created', date, 'var(--muted)', '12px')}
    <button class="del-btn" onclick="delMemory('${d.id}')">Delete memory</button>
  `;
}

function row(label, val, color='', size='') {
  return `<div class="drow"><div class="dlabel">${label}</div><div class="dval" style="color:${color};font-size:${size||'13px'}">${esc(String(val))}</div></div>`;
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
}

async function delMemory(id) {
  if (!confirm('Delete this memory?')) return;
  const r = await fetch(`/api/memory/${id}`, { method: 'DELETE', headers: H });
  if (r.ok) { closeDetail(); selectedId = null; await loadGraph(); }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ── Boot ──────────────────────────────────────────────────────────────────────
loadGraph();
</script>
</body>
</html>

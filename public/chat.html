<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat — ChatFuse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ── Topbar ── */
.topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
    z-index: 100;
}
.topbar-brand { display: flex; align-items: center; gap: 10px; }
.topbar-icon {
    width: 32px; height: 32px; border-radius: 10px;
    background: linear-gradient(135deg, #FF6A2F, #FF3D00);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 11px; color: #fff;
}
.topbar-name { font-weight: 700; font-size: 15px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.back-btn {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: #aaa; padding: 6px 14px; border-radius: 8px;
    cursor: pointer; font-size: 13px; transition: 0.2s; text-decoration: none;
}
.back-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.sound-toggle {
    background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.25);
    color: #8B5CF6; padding: 6px 12px; border-radius: 8px;
    cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s;
}
.sound-toggle:hover { background: rgba(139,92,246,0.2); }
.sound-toggle.muted { opacity: 0.4; }

/* ── Chat Container ── */
.chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 860px;
    width: 100%;
    margin: 0 auto;
    overflow: hidden;
}

/* ── Messages Area ── */
.messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* ── Welcome Screen ── */
.welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    gap: 16px;
    padding: 40px;
}
.welcome-icon {
    width: 72px; height: 72px; border-radius: 20px;
    background: linear-gradient(135deg, #8B5CF6, #6D28D9);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 8px 40px rgba(139,92,246,0.3);
    animation: float 3s ease-in-out infinite;
}
@keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}
.welcome h2 { font-size: 22px; font-weight: 700; }
.welcome p { color: #666; font-size: 14px; max-width: 400px; line-height: 1.6; }
.suggestions {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    margin-top: 8px;
}
.suggestion {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: #aaa; padding: 8px 16px; border-radius: 20px;
    cursor: pointer; font-size: 13px; transition: 0.2s;
}
.suggestion:hover {
    background: rgba(139,92,246,0.1);
    border-color: rgba(139,92,246,0.3);
    color: #8B5CF6;
}

/* ── Message Bubbles ── */
.msg { display: flex; gap: 10px; max-width: 85%; animation: msgIn 0.3s ease-out; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.ai { align-self: flex-start; }
@keyframes msgIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
}

.msg-avatar {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
}
.msg.ai .msg-avatar {
    background: linear-gradient(135deg, #8B5CF6, #6D28D9);
}
.msg.user .msg-avatar {
    background: linear-gradient(135deg, #4285F4, #34A853);
    font-weight: 700; font-size: 12px; color: #fff;
}

.msg-bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
}
.msg.user .msg-bubble {
    background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(109,40,217,0.15));
    border: 1px solid rgba(139,92,246,0.2);
    border-bottom-right-radius: 4px;
}
.msg.ai .msg-bubble {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-bottom-left-radius: 4px;
}
.msg.ai .msg-bubble code {
    background: rgba(255,255,255,0.08);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
}
.msg.ai .msg-bubble pre {
    background: rgba(255,255,255,0.06);
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 13px;
}
.msg-time {
    font-size: 11px;
    color: #444;
    margin-top: 4px;
    text-align: right;
}
.msg.ai .msg-time { text-align: left; }

/* ── Typing Indicator ── */
.typing { display: none; align-self: flex-start; gap: 10px; padding: 0 20px; }
.typing.active { display: flex; }
.typing-dots {
    display: flex; gap: 4px; padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; border-bottom-left-radius: 4px;
}
.typing-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #8B5CF6;
    animation: typingBounce 1.4s infinite ease-in-out;
}
.typing-dot:nth-child(2) { animation-delay: 0.16s; }
.typing-dot:nth-child(3) { animation-delay: 0.32s; }
@keyframes typingBounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
}

/* ── Input Area ── */
.input-area {
    padding: 16px 20px 24px;
    border-top: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
    flex-shrink: 0;
}
.input-row {
    display: flex; gap: 10px; align-items: flex-end;
    max-width: 860px; margin: 0 auto;
}
.input-wrap {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 0;
    transition: border-color 0.2s;
    display: flex;
    align-items: flex-end;
}
.input-wrap:focus-within {
    border-color: rgba(139,92,246,0.5);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
}
#chat-input {
    flex: 1;
    background: none; border: none; outline: none;
    color: #fff; font-size: 14px; font-family: 'Inter', sans-serif;
    padding: 14px 16px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
}
#chat-input::placeholder { color: #555; }
.send-btn {
    width: 46px; height: 46px;
    border-radius: 14px;
    background: linear-gradient(135deg, #8B5CF6, #6D28D9);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: 0.2s;
    flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(139,92,246,0.4); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
.send-btn svg { width: 20px; height: 20px; fill: #fff; }

/* ── Ripple effect on send ── */
.ripple {
    position: fixed;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: rgba(139,92,246,0.3);
    pointer-events: none;
    animation: rippleOut 0.6s ease-out forwards;
}
@keyframes rippleOut {
    to { width: 200px; height: 200px; opacity: 0; margin-left: -100px; margin-top: -100px; }
}

/* ── Responsive ── */
@media (max-width: 640px) {
    .topbar { padding: 10px 14px; }
    .topbar-name { display: none; }
    .messages { padding: 16px 12px; }
    .msg { max-width: 92%; }
    .input-area { padding: 12px 12px 18px; }
}
</style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-brand">
            <div class="topbar-icon">CF</div>
            <span class="topbar-name">ChatFuse AI</span>
        </div>
        <div class="topbar-right">
            <button class="sound-toggle" id="sound-toggle" title="Toggle sound effects">Sound: ON</button>
            <a class="back-btn" id="back-btn" href="/dashboard.html">← Dashboard</a>
        </div>
    </div>

    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">AI</div>
                <h2>ChatFuse AI Assistant</h2>
                <p>Chat with your AI assistant directly. Manage Gmail, Calendar, Drive, Sheets, Docs — all from here.</p>
                <div class="suggestions">
                    <div class="suggestion" onclick="useSuggestion(this)">Show my latest 5 emails</div>
                    <div class="suggestion" onclick="useSuggestion(this)">What's on my calendar today?</div>
                    <div class="suggestion" onclick="useSuggestion(this)">List files in my Drive</div>
                    <div class="suggestion" onclick="useSuggestion(this)">Create a new document</div>
                </div>
            </div>
        </div>
        <div class="typing" id="typing">
            <div class="msg-avatar" style="background:linear-gradient(135deg,#8B5CF6,#6D28D9)">AI</div>
            <div class="typing-dots">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <div class="input-wrap">
                <textarea id="chat-input" placeholder="Type a message..." rows="1"></textarea>
            </div>
            <button class="send-btn" id="send-btn" disabled title="Send message">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

<script>
// ── Auth ──
const params = new URLSearchParams(window.location.search);
let token = params.get('token') || localStorage.getItem('navigator_token');
if (token) {
    localStorage.setItem('navigator_token', token);
    window.history.replaceState({}, '', '/chat.html');
}
if (!token) window.location.href = '/login.html';
const H = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
document.getElementById('back-btn').href = '/dashboard.html?token=' + token;

// ── Sound System ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
let soundEnabled = true;

function ensureAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur, type = 'sine', vol = 0.12) {
    if (!soundEnabled) return;
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
}

function playSendSound() {
    playTone(880, 0.08, 'sine', 0.1);
    setTimeout(() => playTone(1100, 0.1, 'sine', 0.08), 60);
}

function playReceiveSound() {
    playTone(660, 0.1, 'triangle', 0.1);
    setTimeout(() => playTone(880, 0.12, 'triangle', 0.08), 80);
    setTimeout(() => playTone(1047, 0.15, 'triangle', 0.06), 160);
}

function playErrorSound() {
    playTone(330, 0.15, 'sawtooth', 0.08);
    setTimeout(() => playTone(260, 0.2, 'sawtooth', 0.06), 120);
}

function playTypingSound() {
    if (!soundEnabled) return;
    ensureAudio();
    const bufferSize = audioCtx.sampleRate * 0.03;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.02;
    const src = audioCtx.createBufferSource();
    const gain = audioCtx.createGain();
    src.buffer = buffer;
    gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
    src.connect(gain);
    gain.connect(audioCtx.destination);
    src.start();
}

// Toggle sound
const soundBtn = document.getElementById('sound-toggle');
soundBtn.addEventListener('click', () => {
    soundEnabled = !soundEnabled;
    soundBtn.textContent = soundEnabled ? 'Sound: ON' : 'Sound: OFF';
    soundBtn.classList.toggle('muted', !soundEnabled);
    if (soundEnabled) playTone(880, 0.05, 'sine', 0.06);
});

// ── Chat Logic ──
const messagesEl = document.getElementById('messages');
const welcomeEl = document.getElementById('welcome');
const typingEl = document.getElementById('typing');
const input = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
let chatHistory = [];

// Auto-resize textarea
input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    sendBtn.disabled = !input.value.trim();
    playTypingSound();
});

input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

sendBtn.addEventListener('click', sendMessage);

function useSuggestion(el) {
    input.value = el.textContent;
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
    sendBtn.disabled = false;
    input.focus();
}

function timeStr() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function addMessage(text, role) {
    if (welcomeEl) welcomeEl.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatarContent = role === 'ai' ? 'AI' : (localStorage.getItem('navigator_last_email') || '?')[0].toUpperCase();

    div.innerHTML = `
        <div class="msg-avatar">${avatarContent}</div>
        <div>
            <div class="msg-bubble">${escapeHtml(text)}</div>
            <div class="msg-time">${timeStr()}</div>
        </div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
}

function escapeHtml(text) {
    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
}

async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage(text, 'user');
    playSendSound();

    // Show typing
    typingEl.classList.add('active');
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
        const resp = await fetch('/api/chat', {
            method: 'POST',
            headers: H,
            body: JSON.stringify({ message: text })
        });
        const data = await resp.json();
        typingEl.classList.remove('active');

        if (data.success && data.reply) {
            addMessage(data.reply, 'ai');
            playReceiveSound();
        } else {
            addMessage(data.error || 'Something went wrong. Please try again.', 'ai');
            playErrorSound();
        }
    } catch (err) {
        typingEl.classList.remove('active');
        addMessage('Network error. Please check your connection.', 'ai');
        playErrorSound();
    }

    messagesEl.scrollTop = messagesEl.scrollHeight;
}

// Focus input on load
input.focus();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Workspace Navigator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,106,47,0.15) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 44px 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            z-index: 1;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .auth-header { text-align: center; margin-bottom: 32px; }
        .auth-header .icon {
            width: 56px; height: 56px; border-radius: 16px;
            background: linear-gradient(135deg, #FF6A2F, #E5551A);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: 900; color: #fff;
            margin-bottom: 16px; box-shadow: 0 8px 30px rgba(255,106,47,0.3);
        }
        .auth-header h1 {
            font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 8px;
        }
        .auth-header p { color: #888; font-size: 14px; line-height: 1.5; }

        .btn-google {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none;
        }
        .btn-google:hover { background: #f1f1f1; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,255,255,0.1); }

        .divider {
            display: flex; align-items: center; gap: 16px;
            margin: 28px 0; color: #444; font-size: 13px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px;
            background: rgba(255,255,255,0.08);
        }

        .recent-session {
            display: none; padding: 16px; border-radius: 12px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 20px;
        }
        .recent-session.visible { display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.2s; }
        .recent-session:hover { border-color: rgba(255,106,47,0.3); background: rgba(255,106,47,0.04); }
        .recent-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #4285F4, #34A853);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 16px; color: #fff; flex-shrink: 0;
        }
        .recent-info { flex: 1; }
        .recent-email { font-size: 14px; font-weight: 600; color: #fff; }
        .recent-label { font-size: 12px; color: #666; margin-top: 2px; }

        .toggle-mode {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #666;
        }
        .toggle-mode a { color: #FF6A2F; font-weight: 600; text-decoration: none; transition: color 0.2s; }
        .toggle-mode a:hover { color: #fff; }

        #error-msg {
            color: #ff4b4b; font-size: 14px; text-align: center;
            margin-bottom: 15px; display: none;
            background: rgba(255, 75, 75, 0.1); padding: 10px;
            border-radius: 8px; border: 1px solid rgba(255, 75, 75, 0.2);
        }

        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 14px; border-radius: 20px;
            background: rgba(66,133,244,0.1); border: 1px solid rgba(66,133,244,0.2);
            color: #4285F4; font-size: 12px; font-weight: 600;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <div class="auth-card">
        <div class="auth-header">
            <div class="icon">WN</div>
            <div class="status-badge">Secure Google Login</div>
            <h1>Welcome Back</h1>
            <p>Sign in to your Workspace Navigator dashboard and WhatsApp assistant.</p>
        </div>

        <div id="error-msg"></div>

        <!-- Recent session (shown if user was previously logged in) -->
        <div class="recent-session" id="recent-session" onclick="window.location.href='/auth/start?mode=signin'">
            <div class="recent-avatar" id="recent-avatar">?</div>
            <div class="recent-info">
                <div class="recent-email" id="recent-email">—</div>
                <div class="recent-label">Click to sign in again</div>
            </div>
        </div>

        <a href="/auth/start?mode=signin" class="btn-google">
            <svg viewBox="0 0 24 24" width="20" height="20">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </a>

        <div class="toggle-mode">
            Don't have an account? <a href="/register.html">Create one</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tokenFromUrl = urlParams.get('token');
        const errorFromUrl = urlParams.get('error');

        const errorMsg = document.getElementById('error-msg');
        if (errorFromUrl) {
            errorMsg.textContent = decodeURIComponent(errorFromUrl);
            errorMsg.style.display = 'block';
        }

        if (tokenFromUrl) {
            localStorage.setItem('navigator_token', tokenFromUrl);
            window.history.replaceState({}, document.title, window.location.pathname);
            window.location.href = '/dashboard.html';
        } else if (localStorage.getItem('navigator_token')) {
            window.location.href = '/dashboard.html';
        }

        // Only show recent session if user has a valid token (not logged out)
        const lastEmail = localStorage.getItem('navigator_last_email');
        const hasToken = localStorage.getItem('navigator_token');
        if (lastEmail && !hasToken) {
            // User logged out — clean up stored email
            localStorage.removeItem('navigator_last_email');
        } else if (lastEmail && hasToken) {
            const el = document.getElementById('recent-session');
            el.classList.add('visible');
            document.getElementById('recent-email').textContent = lastEmail;
            document.getElementById('recent-avatar').textContent = lastEmail.charAt(0).toUpperCase();
        }
    </script>
</body>
</html>
